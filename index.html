<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Forms</title>
    <style>
        body { background: #0A192F; color: #E6F1FF; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; max-width: 1000px; margin: 20px auto; }
        .card { background: #172A45; padding: 15px; border-radius: 10px; border: 1px solid #3066BE; }
        .card:hover { border-color: #64FFDA; }
        img { height: 120px; object-fit: contain; background: #020C1B; border-radius: 8px; padding: 5px; }
        input, select { background: #020C1B; color: #E6F1FF; border: 1px solid #64FFDA; padding: 8px; border-radius: 5px; margin: 5px; font-size: 1rem; }
        .name { text-transform: capitalize; font-weight: bold; margin: 10px 0; color: #64FFDA; }
    </style>
</head>
<body>

    <h1>Form Master Pokédex</h1>
    <input type="text" id="search" placeholder="Search Pokémon...">
    <label><input type="checkbox" id="shiny"> ✨ Shiny</label>

    <div class="grid" id="dex"></div>

<script>
    const pokemon = [
        { id: 3, name: "venusaur", forms: { "Standard": "3", "Mega": "3-mega", "G-Max": "3-gmax" }},
        { id: 6, name: "charizard", forms: { "Standard": "6", "Mega X": "6-mega-x", "Mega Y": "6-mega-y", "G-Max": "6-gmax" }},
        { id: 9, name: "blastoise", forms: { "Standard": "9", "Mega": "9-mega", "G-Max": "9-gmax" }},
        { id: 25, name: "pikachu", forms: { "Standard": "25", "G-Max": "25-gmax" }},
        { id: 52, name: "meowth", forms: { "Kanto": "52", "Alola": "52-alola", "Galar": "52-galar", "G-Max": "52-gmax" }},
        { id: 77, name: "ponyta", forms: { "Kanto": "77", "Galar": "10162" }},
        { id: 78, name: "rapidash", forms: { "Kanto": "78", "Galar": "10163" }},
        { id: 94, name: "gengar", forms: { "Standard": "94", "Mega": "94-mega", "G-Max": "94-gmax" }},
        { id: 133, name: "eevee", forms: { "Standard": "133", "G-Max": "133-gmax" }},
        { id: 150, name: "mewtwo", forms: { "Standard": "150", "Mega X": "150-mega-x", "Mega Y": "150-mega-y" }},
        { id: 212, name: "scizor", forms: { "Standard": "212", "Mega": "212-mega" }},
        { id: 384, name: "rayquaza", forms: { "Standard": "384", "Mega": "384-mega" }},
        { id: 448, name: "lucario", forms: { "Standard": "448", "Mega": "448-mega" }}
    ];

    const grid = document.getElementById('dex');
    const search = document.getElementById('search');
    const shiny = document.getElementById('shiny');

    function render() {
        grid.innerHTML = '';
        const query = search.value.toLowerCase();
        
        pokemon.filter(p => p.name.includes(query)).forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const firstId = Object.values(p.forms)[0];
            const options = Object.entries(p.forms).map(([k, v]) => `<option value="${v}">${k}</option>`).join('');

            card.innerHTML = `
                <img id="img-${p.id}" src="https://githubusercontent.com{firstId}.png">
                <div class="name">${p.name} (#${String(p.id).padStart(3, '0')})</div>
                <select onchange="updateImg(${p.id}, this.value)">${options}</select>
            `;
            grid.appendChild(card);
        });
    }

    window.updateImg = function(id, val) {
        document.getElementById(`img-${id}`).src = `https://githubusercontent.com{shiny.checked ? 'shiny/' : ''}${val}.png`;
    };

    search.addEventListener('input', render);
    shiny.addEventListener('change', render);
    render();
</script>

</body>
</html>
